{% if date is string %}
    {% set date_value = date %}
{% else %}
    {% set date_value = date.strftime('%Y-%m-%d') %}
{% endif %}
{% if assignments %}
    {% for item in assignments %}
    <div class="assigned-staff">
        <span class="staff-name">{{ item.staff_name }}</span>
        <form method="POST"
              action="{{ url_for('schedule.delete_assignment', assignment_id=item.id) }}"
              class="delete-form"
              hx-post="{{ url_for('schedule.delete_assignment', assignment_id=item.id) }}"
              hx-target="closest .cell-content"
              hx-swap="innerHTML"
              hx-confirm="Remove {{ item.staff_name }} from this shift?">
            <input type="hidden" name="date" value="{{ date_value }}">
            <input type="hidden" name="shift_type" value="{{ shift_type }}">
            <button type="submit" class="btn-remove" title="Remove">×</button>
        </form>
    </div>
    {% endfor %}
    <a href="{{ url_for('schedule.assign') }}?date={{ date_value }}&shift_type={{ shift_type }}"
       class="add-more"
       hx-get="{{ url_for('schedule.assign') }}?date={{ date_value }}&shift_type={{ shift_type }}"
       hx-target="#modal-container">+ Add staff</a>
{% else %}
    <a href="{{ url_for('schedule.assign') }}?date={{ date_value }}&shift_type={{ shift_type }}"
       class="add-link"
       hx-get="{{ url_for('schedule.assign') }}?date={{ date_value }}&shift_type={{ shift_type }}"
       hx-target="#modal-container">
        <span class="unassigned">+ Add coverage</span>
    </a>
{% endif %}
