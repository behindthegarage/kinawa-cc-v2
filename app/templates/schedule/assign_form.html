<div class="modal-overlay" onclick="this.closest('.modal-container').innerHTML=''">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>{% if assignment %}Edit Assignment{% else %}Assign Staff{% endif %}</h2>
            <button type="button" class="modal-close" onclick="this.closest('.modal-container').innerHTML=''">×</button>
        </div>
        
        <form method="POST" action="{% if assignment %}{{ url_for('schedule.assign', assignment_id=assignment.id) }}{% else %}{{ url_for('schedule.assign') }}{% endif %}" 
              class="assignment-form"
              hx-post="{% if assignment %}{{ url_for('schedule.assign', assignment_id=assignment.id) }}{% else %}{{ url_for('schedule.assign') }}{% endif %}"
              hx-target="[data-date='{{ date_str }}'][data-shift='{{ shift_type }}'] .cell-content"
              hx-swap="innerHTML"
              hx-on::after-request="document.getElementById('modal-container').innerHTML=''">
            
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ date_str }}" required>
            </div>
            
            <div class="form-group">
                <label for="shift_type">Shift</label>
                <select id="shift_type" name="shift_type" required>
                    <option value="before" {{ 'selected' if shift_type == 'before' else '' }}>Before Care (6:45 AM - 9:00 AM)</option>
                    <option value="after" {{ 'selected' if shift_type == 'after' else '' }}>After Care (2:30 PM - 6:00 PM)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="staff_id">Staff Member</label>
                <select id="staff_id" name="staff_id" required>
                    <option value="">-- Select Staff --</option>
                    {% for staff in staff_list %}
                    <option value="{{ staff.id }}" {{ 'selected' if assignment and assignment.staff_id == staff.id else '' }}>
                        {{ staff.full_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-container').innerHTML=''">Cancel</button>
                <button type="submit" class="btn btn-primary">{% if assignment %}Update{% else %}Assign{% endif %}</button>
            </div>
        </form>
    </div>
</div>
