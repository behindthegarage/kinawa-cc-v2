{% extends "base.html" %}

{% block content %}
<div class="staff-form-container">
    <div class="form-header">
        <h1>{{ title }}</h1>
        <a href="{{ url_for('staff.index') }}" class="btn btn-secondary">← Back to Staff List</a>
    </div>

    <form method="POST" class="staff-form">
        <div class="form-group">
            <label for="full_name">Full Name *</label>
            <input type="text" id="full_name" name="full_name" value="{{ staff.full_name if staff else '' }}" required autofocus
                   placeholder="e.g., John Smith">
        </div>

        <div class="form-group">
            <label for="hire_date">Hire Date</label>
            <input type="date" id="hire_date" name="hire_date" value="{{ staff.hire_date.strftime('%Y-%m-%d') if staff and staff.hire_date else '' }}">
            <span class="form-hint">Optional — when did this person start?</span>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Any additional information about this staff member...">{{ staff.notes if staff else '' }}</textarea>
        </div>

        {% if staff %}
        <div class="form-group checkbox">
            <label>
                <input type="checkbox" name="active" {{ 'checked' if staff.active else '' }}>
                Active (available for scheduling)
            </label>
        </div>
        {% endif %}

        <div class="form-actions">
            <a href="{{ url_for('staff.index') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{% if staff %}Save Changes{% else %}Add Staff Member{% endif %}</button>
        </div>
    </form>
</div>
{% endblock %}
